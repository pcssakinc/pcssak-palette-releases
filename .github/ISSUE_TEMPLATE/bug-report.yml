name: 오류 제보 / Bug report
description: 재현 가능한 PCssak Palette 베타 오류를 알려주세요.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        공개 양식입니다. 개인정보, 비밀번호, 고객 자료, 비공개 원본 디자인을 올리지 마세요.
  - type: input
    id: app-version
    attributes:
      label: 앱 버전 / App version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows 버전과 비트 / Windows version and architecture
      placeholder: Windows 11 24H2, 64-bit
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 순서 / Steps to reproduce
      description: 문제가 생기기 전부터 순서대로 적어주세요.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 실제 결과 / Actual result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 결과 / Expected result
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 공개 정보 확인
      options:
        - label: 개인정보나 비공개 자료를 포함하지 않았습니다.
          required: true
