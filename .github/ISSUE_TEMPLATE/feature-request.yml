name: Feature request / 기능 제안
description: Describe a user problem before proposing a solution / 해결책보다 사용자 문제를 먼저 알려주세요
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        PCSSAK is keeping the first release focused. A clear recurring problem is more useful than a long feature list.

        첫 출시는 작고 집중된 상태를 유지합니다. 긴 기능 목록보다 반복되는 실제 문제를 구체적으로 알려주세요.
  - type: textarea
    id: problem
    attributes:
      label: User problem / 사용자 문제
      description: Who has the problem, during which workflow, and what does it cost in time or confidence? / 누가 어떤 작업에서 겪으며 시간이나 신뢰에 어떤 손해가 있나요?
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround / 현재 해결 방법
      description: How do you handle it today? / 지금은 어떻게 해결하나요?
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome / 원하는 결과
      description: Describe the result, not only a button or implementation. / 버튼이나 구현 방법보다 끝나야 하는 작업을 설명하세요.
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Main audience / 주요 사용자
      options:
        - Color-vision-different designer / 색각이상 디자이너
        - UI or design-system designer
        - Front-end developer
        - Illustrator, webtoon, or brand designer
        - Beginner / 초보자
        - Other / 기타
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Confirmation / 확인
      options:
        - label: I removed personal, customer, secret, and confidential information. / 개인정보·고객·비밀·회사 자료를 제거했습니다.
          required: true
